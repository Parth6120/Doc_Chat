embedding_model:
    provider: "google"
    model_name: "models/text-embedding-004"

retriever:
    top_k: 10
    search_type: "mmr" # Maximal Marginal Relevance
    fetch_k: 20
    lambda_mult: 0.5

llm:
    google:
        provider: "google"
        model_name: "gemini-1.5-pro"
        temperature: 0.1
        max_output_token: 2048
