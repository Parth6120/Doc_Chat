embedding_model:
    provider: "google"
    model_name: "models/gemini-embedding-001"
    output_dimensionality: 768

pinecone:
    index_name: "doc-chat"

chunking:
    chunk_size: 1000
    chunk_overlap: 250

retriever:
    top_k: 10
    search_type: "mmr" # Maximal Marginal Relevance
    fetch_k: 20
    lambda_mult: 0.5

llm:
    google:
        provider: "google"
        model_name: "gemini-2.5-flash"
        temperature: 0.1
        max_output_token: 2048
